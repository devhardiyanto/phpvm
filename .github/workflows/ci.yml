name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default: no write permissions. Individual jobs/workflows must opt in
# explicitly (release.yml needs `contents: write`).
permissions:
  contents: read

jobs:
  windows:
    name: Windows lint + tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Pester 5 and PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./windows -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }

      - name: Pester (offline)
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $cfg = Import-PowerShellDataFile ./tests/PesterConfiguration.psd1
          $conf = New-PesterConfiguration -Hashtable $cfg
          $conf.Run.Exit = $true
          Invoke-Pester -Configuration $conf

  linux:
    name: Linux shellcheck + bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install shellcheck + bats
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: ShellCheck
        run: shellcheck linux/install.sh linux/phpvm.sh

      - name: Bats (offline)
        run: bats tests/linux/

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check version.txt matches all 4 sources
        run: |
          set -e
          expected=$(tr -d '[:space:]' < version.txt)
          echo "version.txt -> $expected"

          fail=0
          check() {
            local file=$1
            local pattern=$2
            local actual
            actual=$(grep -E "$pattern" "$file" | sed -E "s/.*[\"=]([0-9]+\.[0-9]+\.[0-9]+)\"?/\1/" | head -1)
            if [ "$actual" != "$expected" ]; then
              echo "MISMATCH: $file has '$actual', expected '$expected'"
              fail=1
            else
              echo "OK: $file -> $actual"
            fi
          }

          check windows/phpvm.ps1   '^\$PHPVM_VERSION'
          check windows/install.ps1 '^\$PHPVM_VERSION'
          check linux/phpvm.sh      '^PHPVM_VERSION='
          check linux/install.sh    '^PHPVM_VERSION='

          exit $fail
